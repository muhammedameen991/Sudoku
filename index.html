<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Pro PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
</head>
<body class="light">
    <div class="app-container">
        <header>
            <h1>Sudoku</h1>
            <div class="header-controls">
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
                <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <div id="solo-status" class="status-bar">
            <div class="timer">⏱️ <span id="time">00:00</span></div>
            <div class="mistakes">Mistakes: <span id="mistake-count">0</span>/3</div>
            <label class="toggle-label"><input type="checkbox" id="auto-check" checked> Tips</label>
        </div>

        <div id="pvp-scoreboard" class="status-bar hidden">
            <div id="p1-score-box" class="score-box p1-active">P1: <span id="p1-score">0</span></div>
            <div id="p2-score-box" class="score-box">P2: <span id="p2-score">0</span></div>
        </div>

        <div id="game-board" class="sudoku-grid"></div>

        <div class="controls">
            <button id="btn-hint">💡 Hint</button>
            <button id="btn-solve">🪄 Solve</button>
            <button id="btn-new">➕ Solo</button>
            <button id="btn-pvp" class="pvp-btn">⚔️ PvP</button>
        </div>

        <div class="numpad">
            <button class="num-btn" data-val="1">1</button>
            <button class="num-btn" data-val="2">2</button>
            <button class="num-btn" data-val="3">3</button>
            <button class="num-btn" data-val="4">4</button>
            <button class="num-btn" data-val="5">5</button>
            <button class="num-btn" data-val="6">6</button>
            <button class="num-btn" data-val="7">7</button>
            <button class="num-btn" data-val="8">8</button>
            <button class="num-btn" data-val="9">9</button>
            <button id="btn-erase" class="action-btn">⌫</button>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div class="win-content">
            <h2 id="win-title">🎉 You Won! 🎉</h2>
            <p id="win-subtitle"></p>
            <button id="btn-play-again">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
