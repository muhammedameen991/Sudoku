<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Sudoku PWA</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffffff" />
</head>

<body class="light">

    <!-- Main App Wrapper -->
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <h1>Sudoku</h1>

            <div class="header-controls">
                <!-- Difficulty Selector -->
                <select id="difficulty" aria-label="Select difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>

                <!-- Theme Toggle -->
                <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </header>

        <!-- Game Status Bar -->
        <section class="status-bar">

            <div class="timer">
                ⏱️ <span id="time">00:00</span>
            </div>

            <div class="mistakes">
                Mistakes: <span id="mistake-count">0</span>/3
            </div>

            <!-- Auto Validation Toggle -->
            <label class="toggle-label">
                <input type="checkbox" id="auto-check" checked />
                Validation
            </label>

        </section>

        <!-- Sudoku Board -->
        <main id="game-board" class="sudoku-grid">
            <!-- Cells generated via JS -->
        </main>

        <!-- Game Controls -->
        <section class="controls">
            <button id="btn-hint">💡 Hint</button>
            <button id="btn-solve">🪄 Solve</button>
            <button id="btn-reset">🔄 Reset</button>
            <button id="btn-new">➕ New Game</button>
        </section>

        <!-- Number Pad -->
        <section class="numpad">

            <div class="num-buttons">
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2</button>
                <button class="num-btn" data-val="3">3</button>
                <button class="num-btn" data-val="4">4</button>
                <button class="num-btn" data-val="5">5</button>
                <button class="num-btn" data-val="6">6</button>
                <button class="num-btn" data-val="7">7</button>
                <button class="num-btn" data-val="8">8</button>
                <button class="num-btn" data-val="9">9</button>
            </div>

            <!-- Erase Button -->
            <button id="btn-erase" class="action-btn">⌫</button>

        </section>

    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="hidden">
        <div class="win-content">
            <h2>🎉 You Won! 🎉</h2>

            <p>
                Time: <span id="win-time">00:00</span>
            </p>

            <button id="btn-play-again">Play Again</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>

    <!-- Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js")
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.log("SW registration failed:", err));
        }
    </script>

</body>
</html>
